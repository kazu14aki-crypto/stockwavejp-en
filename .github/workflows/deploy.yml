name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Copy market.json to dist
        working-directory: frontend
        run: |
          mkdir -p dist/data
          if [ -f public/data/market.json ]; then
            cp public/data/market.json dist/data/market.json
            echo "market.json copied: $(wc -c < dist/data/market.json) bytes"
          else
            echo "WARNING: market.json not found, creating empty placeholder"
            echo '{"themes_1d":{"period":"1d","themes":[],"summary":{},"updated_at":""},"status":{"updated_at":""}}' > dist/data/market.json
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
          clean: true
