name: Fetch Market Data (EN)

on:
  schedule:
    # JST 9:05  = UTC 0:05
    - cron: '5 0 * * 1-5'
    # JST 10:05 = UTC 1:05
    - cron: '5 1 * * 1-5'
    # JST 12:05 = UTC 3:05
    - cron: '5 3 * * 1-5'
    # JST 15:05 = UTC 6:05
    - cron: '5 6 * * 1-5'
    # JST 15:40 = UTC 6:40
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch market data
        env:
          INFOWAY_API_KEY: ${{ secrets.INFOWAY_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet frontend/public/data/market.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/market.json
          git commit -m "chore: update market data $(date +'%Y/%m/%d %H:%M JST' -d '+9 hours')"
          git push
